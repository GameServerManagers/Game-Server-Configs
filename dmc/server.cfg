// ****************************************************************************
// Deathmatch Classic
// Config - server.cfg
// Date - 26/04/2026
// ****************************************************************************

// .................................. Basic ................................. //

// hostname - Hostname for server.
hostname "SERVERNAME"

// rcon_password - remote console password.
rcon_password "ADMINPASSWORD"

// sv_password - Server password for entry into multiplayer games.
sv_password ""

// ............................. Server Logging ............................. //

// log - Enables logging to file, console, and udp < on | off >.
log on

// sv_logbans - Log server bans in the server logs.
sv_logbans 1

// sv_logecho - Echo log information to the console.
sv_logecho 1

// sv_logfile - Log server information in the log file.
sv_logfile 1

// sv_log_onefile - Log server information to only one file.
sv_log_onefile 0

// ................................. Security ................................ //

// sv_aim - Enable/disable autoaim.
sv_aim 0

// pausable - Allow clients to pause the server.
// 0 = no, 1 = yes
pausable 0

// ................................ Gameplay ................................ //

// sv_maxspeed - Maximum client movement speed.
sv_maxspeed 320

// mp_timelimit - game time per map in minutes.
mp_timelimit 20

// sv_cheats - Allow cheats on server.
sv_cheats 0

// ................................ Ban List ................................ //

// exec listip.cfg - Load the banned IP address list.
exec listip.cfg

// exec banned.cfg - Load the banned user list.
exec banned.cfg

