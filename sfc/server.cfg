// ****************************************************************************
// SourceForts Classic
// Config - server.cfg
// Date - 26/04/2026
// ****************************************************************************

// .................................. Basic ................................. //

// hostname - Hostname for server.
// Be sure to edit phase_combat.cfg and phase_build.cfg
hostname "SERVERNAME"

// rcon_password - remote console password.
rcon_password "ADMINPASSWORD"

// sv_password - Server password for entry into multiplayer games.
sv_password ""

// sv_contact - Contact email for server sysop.
sv_contact ""

// sv_lan - Server is a lan server ( no heartbeat, no authentication, no non-class C addresses ).
sv_lan 0

// ............................. Server Logging ............................. //

// log - Enables logging to file, console, and udp < on | off >.
log on

// sv_logbans - Log server bans in the server logs.
sv_logbans 1

// sv_logecho - Echo log information to the console.
sv_logecho 1

// sv_logfile - Log server information in the log file.
sv_logfile 1

// sv_log_onefile - Log server information to only one file.
sv_log_onefile 0

// ................................ Ban List ................................ //

// exec banned_user.cfg - Load the banned user ID list.
exec banned_user.cfg

// exec banned_ip.cfg - Load the banned IP address list.
exec banned_ip.cfg

// writeid - Writes a list of permanently-banned user IDs to banned_user.cfg.
writeid

// writeip - Save the ban list to banned_ip.cfg.
writeip

// ............................. Fast Download .............................. //
// info: Allows custom maps to be downloaded to the client.

// sv_allowdownload - Allow clients to download files.
sv_allowdownload 1

// sv_downloadurl - Location from which clients can download missing files.
sv_downloadurl ""

// ...................... SourceForts Classic Settings ...................... //

// mp_sfbanlist - Server Side Only - Enables the use of global ban list.
mp_sfbanlist 1

// sf_team_autoassign - Automatically assign players to teams.
sf_team_autoassign 0

// sf_forcebalance - Force players to only be able to join the losing or smaller team.
sf_forcebalance 1

// sf_team_blocklimit - Limit of blocks per team.
sf_team_blocklimit 50

// sf_build_long_length - Default length of first build time (in seconds).
sf_build_long_length 600

// sf_build_short_length - Default length of all build times apart from the first (in seconds).
sf_build_short_length 240

// sf_combat_length - Default length of combat.
sf_combat_length 600
