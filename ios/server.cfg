// ****************************************************************************
// IOSoccer
// Config - server.cfg
// Date - 26/04/2026
// ****************************************************************************

// .................................. Basic ................................. //

// hostname - Name of the server.
hostname "SERVERNAME"

// rcon_password - Remote console password.
rcon_password "ADMINPASSWORD"

// sv_password - Server password for private servers.
sv_password ""

// ............................... Map Rotation .............................. //

// map - Start playing on specified map.
map "8v8_vienna"

// mapcyclefile - Name of the .txt file used to cycle maps on multiplayer servers.
mapcyclefile "mapcycle.txt"

// ................................. Security ................................ //

// sv_lan - LAN mode. No heartbeat, no authentication, and no public listing.
sv_lan 0

// ............................. Server Logging ............................. //

// sv_logfile - Log server information in the log file.
sv_logfile 1

// sv_logbans - Log server bans in the server logs.
sv_logbans 1

// ............................. Communication .............................. //

// sv_voiceenable - Enable voice communications.
sv_voiceenable 1

// sv_alltalk - Players can hear all other players, no team restrictions.
sv_alltalk 1

// sv_allowupload - Allow clients to upload customization files.
sv_allowupload 1

// sv_allowdownload - Allow clients to download files.
sv_allowdownload 1

// sv_downloadurl - Location from which clients can download missing files.
sv_downloadurl ""

// ................................ Gameplay ................................ //

// mp_ballskin - Ball skin index.
mp_ballskin 1

// mp_pitchtexture - Pitch texture index.
mp_pitchtexture 4

// mp_chat_match_captain_only - Restrict match chat to captains only.
mp_chat_match_captain_only 0

// mp_captaincy_away - Enable captaincy for away team.
mp_captaincy_away 0

// mp_captaincy_home - Enable captaincy for home team.
mp_captaincy_home 0

// mp_extratime - Enable extra time.
mp_extratime 0

// mp_penalties - Enable penalty shootout.
mp_penalties 1

// mp_timelimit_cooldown - Duration of cooldown period in minutes.
mp_timelimit_cooldown 0.25

// mp_timelimit_halftime - Duration of halftime in minutes.
mp_timelimit_halftime 0

// mp_timelimit_extratime_intermission - Duration of extra time intermission in minutes.
mp_timelimit_extratime_intermission 0.25

// mp_timelimit_extratime_halftime - Duration of extra time halftime in minutes.
mp_timelimit_extratime_halftime 0.25

// mp_timelimit_penalties_intermission - Duration of penalties intermission in minutes.
mp_timelimit_penalties_intermission 0.25

// mp_botkeepers - Enable bot goalkeepers.
mp_botkeepers 1

// mp_offside - Enable offside rule.
mp_offside 1

// mp_shield_block_opponent_half - Block players from entering opponent half.
mp_shield_block_opponent_half 0

// sv_ball_player_banduration - Duration in seconds a ball is banned from a player.
sv_ball_player_banduration 4.5

// sv_ball_kickoff_chargeblock - Block charging during kickoff.
sv_ball_kickoff_chargeblock 1

// sv_playerrotation - Enable player rotation.
sv_playerrotation 0

// sv_replay_instant_second_enabled - Enable instant replay second view.
sv_replay_instant_second_enabled 0

// sv_autostartmatch - Automatically start match when teams are full.
sv_autostartmatch 1

// sv_restart - Restart the match.
sv_restart 0.5

