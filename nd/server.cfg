// ****************************************************************************
// Nuclear Dawn
// Config - server.cfg
// Date - 26/04/2026
// ****************************************************************************

// .................................. Basic ................................. //

// hostname - Hostname for server.
hostname "SERVERNAME"

// rcon_password - remote console password.
rcon_password "ADMINPASSWORD"

// sv_password - Server password for entry into multiplayer games.
sv_password ""

// sv_contact - Contact email for server sysop.
sv_contact ""

// sv_lan - Server is a lan server ( no heartbeat, no authentication, no non-class C addresses ).
sv_lan 0

// sv_region - The region of the world to report this server in.
// -1=World, 0=US East, 1=US West, 2=South America, 3=Europe, 4=Asia, 5=Australia, 6=Middle East, 7=Africa
sv_region -1

// sv_tags - Server tags. Used to provide extra information to clients when they're browsing for servers. Separate tags with a comma.
sv_tags "nucleardawn"

// ................................. Security ................................ //

// sv_rcon_banpenalty - Number of minutes to ban users who fail rcon authentication.
sv_rcon_banpenalty 10

// sv_rcon_log - Enable/disable rcon logging.
sv_rcon_log 1

// sv_rcon_maxfailures - Max number of times a user can fail rcon authentication before being banned.
sv_rcon_maxfailures 5

// sv_rcon_minfailures - Number of times a user can fail rcon authentication in sv_rcon_minfailuretime before being banned.
sv_rcon_minfailures 5

// sv_rcon_minfailuretime - Number of seconds to track failed rcon authentications.
sv_rcon_minfailuretime 10

// ............................. Server Logging ............................. //

// log - Enables logging to file, console, and udp < on | off >.
log on

// sv_logbans - Log server bans in the server logs.
sv_logbans 1

// sv_logecho - Echo log information to the console.
sv_logecho 1

// sv_logfile - Log server information in the log file.
sv_logfile 1

// sv_log_onefile - Log server information to only one file.
sv_log_onefile 0

// ............................. Communication .............................. //

// sv_voiceenable - Enable voice communications.
sv_voiceenable 0

// sv_alltalk - Players can hear all other players' voice communication, no team restrictions.
sv_alltalk 0

// mp_allowspectators - toggles whether the server allows spectator mode or not.
mp_allowspectators 1

// ................................ Gameplay ................................ //

// mp_limitteams - Max # of players 1 team can have over another (0 disables check).
mp_limitteams 1

// mp_autoteambalance - Auto team balance. 0 = Disabled, 1 = End of round, 2 = Mid round when a team has [mp_unbalance_limit] less players than the oth.
// 0=Disabled, 1=Balance at round end, 2=Balance during game, 3=Balance throughout.
mp_autoteambalance 2

// mp_unbalance_limit - Teams are unbalanced when one team has this many more players than the other team. (0 disables check).
mp_unbalance_limit 2

// mp_autoteambalance_delay - Seconds after the start of a round before a team balance is considered if mp_autoteambalance is set to 2 or 3.
mp_autoteambalance_delay 60

// mp_roundend_teamswap - Should teams be swapped at round end.
mp_roundend_teamswap 0

// nd_commander_accept_time - Time (seconds) the selected commander has to accept.
nd_commander_accept_time 15

// nd_commander_election_time - Seconds before commander is selected at round start.
nd_commander_election_time 45

// nd_commander_mutiny_min_players - Min number of players connected to begin a mutiny vote.
nd_commander_mutiny_min_players 3

// nd_commander_mutiny_surpress_time - Time in minutes before a mutiny can start after a previous one, or after a new round.
nd_commander_mutiny_surpress_time  5

// nd_commander_mutiny_time - Time (in seconds) a mutiny vote lasts.
nd_commander_mutiny_time 30

// nd_commander_mutiny_vote_threshold - The percentage of team votes required for the current commander to be voted off.
nd_commander_mutiny_vote_threshold 51.0

// nd_commander_surrender_vote_threshold - The percentage of team votes required for the team to surrender the round.
nd_commander_surrender_vote_threshold 51.0

// mp_force_autoassign - Force player autoassign to teams.
mp_force_autoassign 0

// nd_starting_resources - Resources that each team starts the game with.
nd_starting_resources 3000

// nd_spawn_min_time - Min time in seconds player must be dead for before they can spawn.
nd_spawn_min_time 6.0

// nd_spawn_wave_interval - Time in seconds between spawn waves.
nd_spawn_wave_interval 12.0

// .............................. Map Rotation .............................. //

// mp_roundtime - How long (in minutes) should a round last.
mp_roundtime 35

// mp_timelimit - game time per map in minutes.
mp_timelimit 70

// mp_maxrounds - How many rounds in each map. 0 for unlimited.
mp_maxrounds 2

// nd_xmas - Enable Christmas hats. 0=Disabled, 1=Commanders only, 2=Everyone.
nd_xmas 0

// .................................. Bots .................................. //

// bot_quota - Determines the total number of bots in the game.
bot_quota 0

// bot_quota_mode - Determines the type of quota. Allowed values: 'normal', 'fill', and 'match'. If 'fill', the server will adjust bots to keep N p.
bot_quota_mode fill

// bot_join_after_player - If nonzero, bots wait until a player joins before entering the game.
bot_join_after_player 0
