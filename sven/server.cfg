// ****************************************************************************
// Sven Co-op
// Config - server.cfg
// Date - 26/04/2026
// ****************************************************************************

// .................................. Basic ................................. //

// See server_example.cfg for more available commands and settings.

// hostname - Name of the server.
hostname "SERVERNAME"

// ............................. Server Logging ............................. //

// log - Enable/disable logging.
log "on"

// ................................. Security ................................ //

// rcon_password - Remote console password.
rcon_password "ADMINPASSWORD"

// sv_password - Server password for private servers.
// sv_password ""

// ................................. Runtime ................................. //

// sys_ticrate - Server tickrate.
sys_ticrate 100
deathmatch 1
decalfrequency 30
hpk_maxsize 2

// pausable - Allow clients to pause the server.
pausable 0

// ................................ Gameplay ................................ //

sv_aim 0
sv_allowdownload 1
sv_allowupload 1
sv_region 255
sv_send_resources 1
sv_voicecodec "voice_speex"
sv_voiceenable 1
sv_voicequality 5

mp_telefrag 1
mp_timelimit 99
mp_weaponstay 1

exec banned.cfg
exec listip.cfg